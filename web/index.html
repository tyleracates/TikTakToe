<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tik-Tak-Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="profile-name-display" class="profile-name-display"></div>
    <div id="user-menu-container">
        <button id="user-menu-btn" title="User Menu">☰</button>
        <div id="user-menu" class="user-menu">
            <div id="set-profile-name" style="margin-bottom: 12px;">Create Profile</div>
            <div id="set-screen-color" style="margin-bottom: 12px;">Set Screen Color</div>
            <div id="highscore-menu" style="padding: 10px 24px; cursor: pointer; text-align: center; margin-left: auto; margin-right: auto; display: block; border: 1.5px solid #fff; border-radius: 6px; margin-bottom: 12px; background: #000; color: #fff; font-size: 1em;">Highscore</div>
            <div id="color-panel" class="color-panel">
                <div class="color-option" data-color="#222">Default</div>
                <div class="color-option" data-color="#e53935">Red</div>
                <div class="color-option" data-color="#43a047">Green</div>
                <div class="color-option" data-color="#1e88e5">Blue</div>
                <div class="color-option" data-color="#fbc02d">Yellow</div>
                <div class="color-option" data-color="#8e24aa">Purple</div>
                <div class="color-option" data-color="#fb8c00">Orange</div>
                <div class="color-option" data-color="#ec407a">Pink</div>
                <div class="color-option" data-color="#888">Grey</div>
                <div class="color-option" data-color="#fff">White</div>
                <div class="color-option" data-color="#795548">Brown</div>
            </div>
        </div>
    </div>
    <h1>Tik-Tak-Toe</h1>
    <div id="game-board" class="board"></div>
    <div id="status"></div>
    <button id="reset">Reset Game</button>
    <div id="scoreboard-container">
        <div id="score-title">Want to know how many times you lost? Well, look no further!</div>
        <div id="scoreboard"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
